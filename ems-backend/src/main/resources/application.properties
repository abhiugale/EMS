spring.application.name=ems-backend
spring.profiles.active=dev

# Database Settings
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ems_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Urvi@7860}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Multipart Config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Settings
jwt.secret=${JWT_SECRET:supersecretjwtkeyforprodemsapp1234567890!}
jwt.expiration-ms=${JWT_EXPIRY_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRY_MS:86400000}

# ML Service URL
ml.service.url=${ML_SERVICE_URL:http://localhost:8001}

# MinIO Config
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:ems-bucket}

# Notification Settings
whatsapp.api.token=${WHATSAPP_API_TOKEN:}
whatsapp.api.phoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:}

twilio.sid=${TWILIO_SID:}
twilio.authToken=${TWILIO_AUTH_TOKEN:}
twilio.from=${TWILIO_FROM:}

# Mail Settings
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# CORS Security
cors.origins=${CORS_ORIGINS:http://localhost:5173}
